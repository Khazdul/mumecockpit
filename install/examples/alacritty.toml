# Alacritty config — cockpit canonical look, Linux/macOS variant.
# This file is an example: the installer does not write it for you on
# Linux or macOS. Copy it to ~/.config/alacritty/alacritty.toml and
# edit as needed.

[colors.primary]
foreground = "#C0C0C0"
background = "#000000"

[colors.normal]
black   = "#000000"
red     = "#800000"
green   = "#008000"
yellow  = "#808000"
blue    = "#000080"
magenta = "#800080"
cyan    = "#008080"
white   = "#C0C0C0"

[colors.bright]
black   = "#808080"
red     = "#FF0000"
green   = "#00FF00"
yellow  = "#FFFF00"
blue    = "#0000FF"
magenta = "#FF00FF"
cyan    = "#00FFFF"
white   = "#FFFFFF"

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 500
thickness = 0.15

[window]
startup_mode = "Windowed"
padding = { x = 6, y = 6 }
dynamic_padding = true
decorations = "Full"

[font]
size = 15

[font.normal]
# Linux default. macOS users: substitute "Menlo" here — see
# docs/install-bootstrap.md "Font selection" table for rationale.
family = "DejaVu Sans Mono"

[font.bold]
family = "DejaVu Sans Mono"

[font.italic]
family = "DejaVu Sans Mono"

[scrolling]
history = 10000

[selection]
save_to_clipboard = true
