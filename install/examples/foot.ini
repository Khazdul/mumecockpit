# foot config — cockpit canonical look, WSLg (Windows) deployment.
# Installed to ~/.config/foot/foot.ini by the Windows installer
# (installer-core.ps1). Native Linux and macOS do not use foot.
#
# Every key the launcher's Terminal Settings page may rewrite is set
# explicitly below — see ADR 0107. Keys are seeded at behaviour-
# preserving values so a clean install matches the unmanaged-template
# behaviour, and the writer's normal path is an in-place rewrite.
# `initial-window-size-pixels` is a static placeholder; Phase 2's
# installer will overwrite it with a resolution-derived value.

initial-window-mode=fullscreen
initial-window-size-pixels=1280x800
font=DejaVu Sans Mono:size=15
pad=0x0
selection-target=clipboard

[scrollback]
lines=10000

[cursor]
style=beam
blink=yes

[key-bindings]
# Harmless escape hatch — leaves the user a way out of fullscreen if they
# ever want it. The cockpit itself never relies on this binding.
fullscreen=Control+Shift+f

# DOS palette — mirrors install/examples/alacritty.toml so the cockpit looks
# the same under foot as under Alacritty.
[colors]
foreground=C0C0C0
background=000000

regular0=000000
regular1=800000
regular2=008000
regular3=808000
regular4=000080
regular5=800080
regular6=008080
regular7=C0C0C0

bright0=808080
bright1=FF0000
bright2=00FF00
bright3=FFFF00
bright4=0000FF
bright5=FF00FF
bright6=00FFFF
bright7=FFFFFF
