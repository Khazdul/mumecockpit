# kitty config — cockpit canonical look, macOS deployment.
# Installed to ~/.config/kitty/kitty.conf by the macOS installer
# (bootstrap-macos.sh). Windows uses foot; Linux uses Alacritty.
#
# Mirrors the DOS palette of install/examples/foot.ini and
# install/examples/alacritty.toml so the cockpit looks the same under
# kitty as it does elsewhere. The cockpit paints its own borders, so the
# window is chromeless with zero padding.

font_family DejaVu Sans Mono
font_size 15.0

foreground #C0C0C0
background #000000

cursor_shape beam
cursor_blink_interval 0.5

window_padding_width 0
hide_window_decorations yes

scrollback_lines 10000
copy_on_select clipboard

# DOS palette — color0–7 from foot.ini regular0–7, color8–15 from bright0–7.
color0 #000000
color1 #800000
color2 #008000
color3 #808000
color4 #000080
color5 #800080
color6 #008080
color7 #C0C0C0

color8  #808080
color9  #FF0000
color10 #00FF00
color11 #FFFF00
color12 #0000FF
color13 #FF00FF
color14 #00FFFF
color15 #FFFFFF
