# scripts.conf — per-script enable state.
#
# Format: <script-stem>=0 (disabled) or =1 (enabled).
# Lines starting with `#` and blank lines are ignored.
#
# This shipped template lists every script that ships in the repo as
# disabled — example scripts are learning material, not silent
# behaviours that turn themselves on for a fresh install. The launcher
# writes the user's choices to bridge/runtime/scripts.conf, which
# shadows this file at brain startup. A script absent from both files
# defaults to enabled — so user-private scripts dropped into
# lua/scripts/ keep loading without needing a conf entry.

coinlooter=0
keymanager=0
mercenaries=0
