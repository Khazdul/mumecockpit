# tmux bootstrap config — read via `tmux -f` at new-session so pane 0 (the game
# pane) inherits the raised scrollback at creation. history-limit is locked when
# a pane is created and cannot be changed on an existing pane, so it must exist
# before new-session builds pane 0; a -f config file is the earliest hook.
# 100000 raised from the tmux default of 2000 (ADR 0025/0127: player-visible
# copy-mode scrollback, not tt++'s #buffer). tmux allocates history lazily, so
# memory grows only with lines actually produced.
set -g history-limit 100000
